# festival_SWing — Nginx 리버스 프록시 설정 (SSL 포함)
# 인증서 경로: acme.sh → /etc/ssl/festival/
# 사용법:
#   sudo cp nginx.conf /etc/nginx/sites-available/festival
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name festival-swing.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name festival-swing.duckdns.org;

    ssl_certificate     /etc/ssl/festival/fullchain.pem;
    ssl_certificate_key /etc/ssl/festival/key.pem;

    location / {
        proxy_pass         http://localhost:3002;
        proxy_http_version 1.1;

        # Socket.io WebSocket 업그레이드 필수 헤더
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 모바일 네트워크 장기 연결 유지
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
