# festival_SWing — Nginx 리버스 프록시 설정
# 사용법:
#   1. example.com 을 실제 도메인으로 교체
#   2. sudo cp nginx.conf /etc/nginx/sites-available/festival
#   3. sudo ln -s /etc/nginx/sites-available/festival /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d example.com  ← SSL 자동 발급 및 설정 주입

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name example.com;

    location / {
        proxy_pass         http://localhost:3002;
        proxy_http_version 1.1;

        # Socket.io WebSocket 업그레이드 필수 헤더
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 모바일 네트워크 장기 연결 유지 (Socket.io polling 포함)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
